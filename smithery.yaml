startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - apiToken
    properties:
      apiToken:
        type: string
        title: Rolli API Token
        description: Your Rolli API token
      userId:
        type: string
        title: Rolli User ID
        description: Your Rolli user ID (optional, defaults to "rolli-mcp")
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@rolli/mcp"],
      env: {
        ROLLI_API_TOKEN: config.apiToken,
        ...(config.userId ? { ROLLI_USER_ID: config.userId } : {}),
      },
    })
